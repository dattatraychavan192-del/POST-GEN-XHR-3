<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/CSS/style.css" />

    <title>POST-Gen-XHR-3</title>
  </head>
  <body>
    <div class="container mt-4">
      <div class="row">
        <div class="col-md-4 offset-md-4 mt-">
          <div class="card shadow">
            <div class="card-header text-center">
              <strong
                ><i class="fa-solid fa-image-portrait"></i> ADD POST</strong
              >
            </div>
            <div class="card-body">
              <form id="postForm">
                <div class="form-group">
                  <label for="title"><strong>Title</strong></label>
                  <input
                    required
                    rounded-3
                    type="text"
                    class="form-control"
                    placeholder="Title"
                    id="title"
                  />
                </div>
                <div class="form-group">
                  <label for="body"><strong>Body</strong></label>
                  <input
                    required
                    type="text"
                    class="form-control"
                    placeholder="Body"
                    id="body"
                  />
                </div>
                <div class="form-group">
                  <label for="userId"><strong>UserId</strong></label>
                  <select required name="" id="userId" class="form-control">
                    <option value="1">user 1</option>
                    <option value="2">user 2</option>
                    <option value="3">user 3</option>
                    <option value="4">user 4</option>
                    <option value="5">user 5</option>
                    <option value="6">user 6</option>
                    <option value="7">user 7</option>
                    <option value="8">user 8</option>
                    <option value="9">user 9</option>
                    <option value="10">user 10</option>
                  </select>
                </div>

                <button
                  class="btn btn-block btn-sm btn-light border border-info"
                  id="editBtn"
                >
                  <i class="fa-solid fa-user-plus"></i> Add Comments
                </button>
                <button
                  type="button"
                  class="btn btn-block d-none btn-sm btn-light border border-success"
                  id="updateBtn"
                >
                  <i class="fa-solid fa-user-plus"></i> Update Comments
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div class="row" id="cardContainer">
        <div class="col-md-12"></div>
      </div>
    </div>

    <div class="spinner d-none" id="spinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden"></span>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./assets/JS/app.js"></script>
  </body>
</html>
